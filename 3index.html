<div class="form-wrapper">
  <img src="submit.png" class="form-bg">

  <form id="submitForm" action="https://formspree.io/f/meevwldn" method="POST">

    <!-- TOP ROW -->
    <div class="row two">
      <div class="field">
        <label>Name*</label>
        <input type="text" name="name" required>
      </div>

      <div class="field">
        <label>Email*</label>
        <input type="email" name="email" required>
      </div>
    </div>

    <!-- SECOND ROW -->
    <div class="row two">
      <div class="field">
        <label>Category*</label>
        <select name="category" required>
          <option value="">Select one</option>
          <option>Character</option>
          <option>Show</option>
          <option>Style</option>
          <option>Program</option>
        </select>
      </div>

      <div class="field">
        <label>IDEA:</label>
        <textarea name="idea" required></textarea>
      </div>
    </div>

    <button type="submit" class="submit-btn">SUBMIT</button>

  </form>
</div>
